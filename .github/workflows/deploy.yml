steps:
  - name: Deploy to EC2
    uses: appleboy/ssh-action@master
    with:
      host: 13.203.154.124
      username: ubuntu
      key: ${{ secrets.EC2_SSH_KEY }}
      script: |
        cd ~/kamlesh-prasad-executive
        git pull origin main
        npm install
        npm run build
        sudo rm -rf /var/www/html/*
        sudo cp -r dist/* /var/www/html/
        sudo systemctl restart nginx
